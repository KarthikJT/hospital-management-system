<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediCore — Hospital Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --teal: #0d9488;
            --teal-light: #14b8a6;
            --teal-dark: #0f766e;
            --navy: #0f172a;
            --slate: #1e293b;
            --muted: #64748b;
            --light: #f1f5f9;
            --white: #ffffff;
            --red: #ef4444;
            --green: #22c55e;
            --gold: #f59e0b;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--navy);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Mesh background */
        .bg-mesh {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse 80% 50% at 20% 30%, rgba(13,148,136,0.18) 0%, transparent 60%),
                radial-gradient(ellipse 60% 60% at 80% 70%, rgba(15,118,110,0.14) 0%, transparent 60%),
                radial-gradient(ellipse 50% 50% at 50% 10%, rgba(245,158,11,0.06) 0%, transparent 50%),
                var(--navy);
        }

        /* Grid lines */
        .bg-grid {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* Floating cross icons */
        .cross {
            position: fixed;
            color: rgba(13,148,136,0.15);
            font-size: 20px;
            animation: floatCross 8s ease-in-out infinite alternate;
            z-index: 0;
            pointer-events: none;
        }
        .cross:nth-child(1) { top: 15%; left: 10%; animation-delay: 0s; font-size: 28px; }
        .cross:nth-child(2) { top: 70%; left: 5%; animation-delay: 2s; font-size: 16px; }
        .cross:nth-child(3) { top: 25%; right: 8%; animation-delay: 1s; font-size: 22px; }
        .cross:nth-child(4) { bottom: 20%; right: 12%; animation-delay: 3s; font-size: 18px; }
        .cross:nth-child(5) { top: 50%; left: 50%; animation-delay: 1.5s; font-size: 14px; }

        @keyframes floatCross {
            from { transform: translate(0, 0) rotate(0deg); opacity: 0.15; }
            to { transform: translate(10px, -15px) rotate(15deg); opacity: 0.35; }
        }

        /* Main card */
        .card {
            position: relative;
            z-index: 2;
            width: 440px;
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 24px;
            padding: 44px 40px;
            box-shadow:
                0 0 0 1px rgba(13,148,136,0.1),
                0 32px 80px rgba(0,0,0,0.5),
                inset 0 1px 0 rgba(255,255,255,0.06);
            animation: cardIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(32px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 36px;
        }

        .logo-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--teal), var(--teal-dark));
            border-radius: 16px;
            font-size: 28px;
            margin-bottom: 16px;
            box-shadow: 0 8px 24px rgba(13,148,136,0.4);
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            color: var(--white);
            letter-spacing: -0.3px;
            margin-bottom: 6px;
        }

        .header p {
            font-size: 13px;
            color: var(--muted);
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 30px;
            gap: 4px;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            border-radius: 9px;
            font-size: 13.5px;
            font-weight: 500;
            cursor: pointer;
            color: var(--muted);
            transition: all 0.3s ease;
            letter-spacing: 0.2px;
        }

        .tab.active {
            background: linear-gradient(135deg, var(--teal), var(--teal-dark));
            color: white;
            box-shadow: 0 4px 14px rgba(13,148,136,0.35);
        }

        /* Form sections */
        .form-section { display: none; }
        .form-section.active { display: block; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(8px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .field {
            margin-bottom: 18px;
        }

        .field label {
            display: block;
            font-size: 11.5px;
            font-weight: 600;
            color: var(--muted);
            letter-spacing: 0.8px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .input-wrap {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 15px;
            opacity: 0.4;
            pointer-events: none;
        }

        .field input {
            width: 100%;
            padding: 12px 14px 12px 40px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            color: white;
            font-size: 14px;
            font-family: 'Outfit', sans-serif;
            font-weight: 400;
            transition: all 0.2s;
            outline: none;
        }

        .field input:focus {
            border-color: var(--teal);
            background: rgba(13,148,136,0.08);
            box-shadow: 0 0 0 3px rgba(13,148,136,0.12);
        }

        .field input::placeholder { color: rgba(255,255,255,0.2); }

        /* Password strength */
        .strength-bar {
            height: 3px;
            border-radius: 2px;
            margin-top: 8px;
            background: rgba(255,255,255,0.08);
            overflow: hidden;
            display: none;
        }
        .strength-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.3s, background 0.3s;
            width: 0%;
        }

        /* Button */
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--teal-light), var(--teal-dark));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            margin-top: 6px;
            transition: all 0.2s;
            box-shadow: 0 6px 22px rgba(13,148,136,0.35);
            letter-spacing: 0.2px;
            position: relative;
            overflow: hidden;
        }

        .btn-submit::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .btn-submit:hover::before { opacity: 1; }
        .btn-submit:hover { transform: translateY(-1px); box-shadow: 0 10px 30px rgba(13,148,136,0.45); }
        .btn-submit:active { transform: translateY(0); }

        .btn-submit.loading {
            pointer-events: none;
            opacity: 0.8;
        }

        /* Message */
        .msg {
            margin-top: 16px;
            font-size: 13px;
            text-align: center;
            padding: 10px 14px;
            border-radius: 9px;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .msg.error {
            background: rgba(239,68,68,0.12);
            color: #fca5a5;
            border: 1px solid rgba(239,68,68,0.25);
        }

        .msg.success {
            background: rgba(34,197,94,0.12);
            color: #86efac;
            border: 1px solid rgba(34,197,94,0.25);
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 28px;
            font-size: 11.5px;
            color: rgba(255,255,255,0.15);
            letter-spacing: 0.3px;
        }
    </style>
</head>
<body>

<div class="bg-mesh"></div>
<div class="bg-grid"></div>
<span class="cross">✚</span>
<span class="cross">✚</span>
<span class="cross">✚</span>
<span class="cross">✚</span>
<span class="cross">✚</span>

<div class="card">
    <div class="header">
        <div class="logo-badge">🏥</div>
        <h1>MediCore HMS</h1>
        <p>Hospital Management Portal</p>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('login')">Sign In</div>
        <div class="tab" onclick="switchTab('signup')">Create Account</div>
    </div>

    <!-- LOGIN -->
    <div class="form-section active" id="loginSection">
        <div class="field">
            <label>Username</label>
            <div class="input-wrap">
                <span class="input-icon">👤</span>
                <input type="text" id="loginUsername" placeholder="Enter your username" autocomplete="username">
            </div>
        </div>
        <div class="field">
            <label>Password</label>
            <div class="input-wrap">
                <span class="input-icon">🔒</span>
                <input type="password" id="loginPassword" placeholder="Enter your password" autocomplete="current-password"
                    onkeydown="if(event.key==='Enter') login()">
            </div>
        </div>
        <button class="btn-submit" id="loginBtn" onclick="login()">Sign In →</button>
        <div class="msg" id="loginMsg"></div>
    </div>

    <!-- SIGNUP -->
    <div class="form-section" id="signupSection">
        <div class="field">
            <label>Username</label>
            <div class="input-wrap">
                <span class="input-icon">👤</span>
                <input type="text" id="signupUsername" placeholder="Choose a username" autocomplete="username">
            </div>
        </div>
        <div class="field">
            <label>Password</label>
            <div class="input-wrap">
                <span class="input-icon">🔒</span>
                <input type="password" id="signupPassword" placeholder="At least 6 characters"
                    oninput="checkStrength(this.value)" autocomplete="new-password">
            </div>
            <div class="strength-bar" id="strengthBar">
                <div class="strength-fill" id="strengthFill"></div>
            </div>
        </div>
        <div class="field">
            <label>Confirm Password</label>
            <div class="input-wrap">
                <span class="input-icon">🔒</span>
                <input type="password" id="signupConfirm" placeholder="Repeat your password" autocomplete="new-password"
                    onkeydown="if(event.key==='Enter') signup()">
            </div>
        </div>
        <button class="btn-submit" id="signupBtn" onclick="signup()">Create Account →</button>
        <div class="msg" id="signupMsg"></div>
    </div>

    <div class="footer">© 2025 MediCore Hospital Management System</div>
</div>

<script>
    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach((t, i) => {
            t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'signup'));
        });
        document.getElementById('loginSection').classList.toggle('active', tab === 'login');
        document.getElementById('signupSection').classList.toggle('active', tab === 'signup');
        ['loginMsg', 'signupMsg'].forEach(id => {
            document.getElementById(id).style.display = 'none';
        });
    }

    function showMsg(id, text, type) {
        const el = document.getElementById(id);
        el.textContent = text;
        el.className = `msg ${type}`;
        el.style.display = 'block';
    }

    function checkStrength(val) {
        const bar = document.getElementById('strengthBar');
        const fill = document.getElementById('strengthFill');
        bar.style.display = 'block';
        let score = 0;
        if (val.length >= 6) score++;
        if (val.length >= 10) score++;
        if (/[A-Z]/.test(val)) score++;
        if (/[0-9]/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;
        const pct = (score / 5) * 100;
        const colors = ['#ef4444','#f97316','#eab308','#22c55e','#0d9488'];
        fill.style.width = pct + '%';
        fill.style.background = colors[score - 1] || '#ef4444';
    }

    function setLoading(btnId, loading) {
        const btn = document.getElementById(btnId);
        btn.classList.toggle('loading', loading);
        btn.textContent = loading ? 'Please wait...' : (btnId === 'loginBtn' ? 'Sign In →' : 'Create Account →');
    }

    async function login() {
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value;
        if (!username || !password) return showMsg('loginMsg', '⚠️ Please fill in all fields.', 'error');

        setLoading('loginBtn', true);
        try {
            const res = await fetch('/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            if (res.ok) {
                localStorage.setItem('token', data.token);
                localStorage.setItem('username', username);
                showMsg('loginMsg', '✅ Login successful! Redirecting...', 'success');
                setTimeout(() => window.location.href = '/Index.html', 1000);
            } else {
                showMsg('loginMsg', data.message || '❌ Login failed. Check credentials.', 'error');
            }
        } catch(e) {
            showMsg('loginMsg', '❌ Server unreachable. Try again.', 'error');
        } finally {
            setLoading('loginBtn', false);
        }
    }

    async function signup() {
        const username = document.getElementById('signupUsername').value.trim();
        const password = document.getElementById('signupPassword').value;
        const confirm  = document.getElementById('signupConfirm').value;

        if (!username || !password) return showMsg('signupMsg', '⚠️ Please fill in all fields.', 'error');
        if (password !== confirm)   return showMsg('signupMsg', '❌ Passwords do not match.', 'error');
        if (password.length < 6)    return showMsg('signupMsg', '❌ Password must be at least 6 characters.', 'error');

        setLoading('signupBtn', true);
        try {
            const res = await fetch('/auth/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            if (res.ok) {
                showMsg('signupMsg', '✅ Account created! Redirecting to login...', 'success');
                setTimeout(() => switchTab('login'), 1500);
            } else {
                showMsg('signupMsg', data.message || '❌ Signup failed.', 'error');
            }
        } catch(e) {
            showMsg('signupMsg', '❌ Server unreachable. Try again.', 'error');
        } finally {
            setLoading('signupBtn', false);
        }
    }

    if (localStorage.getItem('token')) window.location.href = '/Index.html';
</script>
</body>
</html>
