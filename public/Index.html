<!DOCTYPE html>
<html>
<head>
    <title>Hospital Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
 
<!-- Top Navbar -->
<div class="navbar">
    <span>🏥 Hospital Management</span>
    <div class="nav-right">
        <span id="loggedInUser"></span>
        <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
</div>
 
<div class="container">
 
<div class="card">
    <h2>Add Patient</h2>
    <form id="patientForm">
        <input type="hidden" id="editId">
        <input type="text" id="name" placeholder="Patient Name" required>
        <input type="number" id="age" placeholder="Age" required>
 
        <select id="gender" required>
            <option value="">Select Gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
        </select>
 
        <input type="text" id="disease" placeholder="Disease" required>
 
        <select id="doctorSelect" required>
            <option value="">Select Doctor</option>
        </select>
 
        <input type="text" id="availability" placeholder="Availability" readonly>
        <input type="text" id="fee" placeholder="Consultation Fee" readonly>
 
        <button type="submit" id="submitBtn">Add Patient</button>
        <button type="button" id="cancelBtn" style="display:none; background:#aaa;">Cancel</button>
    </form>
</div>
 
<div class="card">
    <h2>Patient List</h2>
    <input type="text" id="searchInput" placeholder="🔍 Search by name or disease...">
 
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Age</th>
                <th>Gender</th>
                <th>Disease</th>
                <th>Doctor</th>
                <th>Amount</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="patientTable"></tbody>
    </table>
</div>
 
</div>
 
<script src="script.js"></script>
</body>
</html>
